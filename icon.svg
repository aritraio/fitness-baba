<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgG" cx="50%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#141c22"/>
      <stop offset="100%" stop-color="#080c0f"/>
    </radialGradient>
    <linearGradient id="primaryG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5c0"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgG)" stroke="#1e2d38" stroke-width="8"/>
  
  <!-- Stylized Monogram FB / Dumbbell -->
  <g transform="translate(128, 128)">
    <!-- Muscle/Lightning Bolt motif -->
    <path d="M40 20 L216 20 A20 20 0 0 1 236 40 L236 70 A20 20 0 0 1 216 90 L40 90 A20 20 0 0 1 20 70 L20 40 A20 20 0 0 1 40 20 Z" fill="none" stroke="url(#primaryG)" stroke-width="16" stroke-linecap="round"/>
    <path d="M40 166 L216 166 A20 20 0 0 1 236 186 L236 216 A20 20 0 0 1 216 236 L40 236 A20 20 0 0 1 20 216 L20 186 A20 20 0 0 1 40 166 Z" fill="none" stroke="url(#primaryG)" stroke-width="16" stroke-linecap="round"/>
    <line x1="128" y1="90" x2="128" y2="166" stroke="url(#primaryG)" stroke-width="24" stroke-linecap="round"/>
    
    <!-- Glowing core circle -->
    <circle cx="128" cy="128" r="16" fill="#00e5c0" filter="drop-shadow(0px 0px 8px #00e5c0)"/>
  </g>
</svg>
